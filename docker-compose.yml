version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: swiftserve
      POSTGRES_USER: ${POSTGRES_USER:-swiftserve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swiftserve}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloud:
    build:
      context: ./packages/cloud
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-swiftserve}:${POSTGRES_PASSWORD}@postgres:5432/swiftserve
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  edge:
    build:
      context: ./packages/edge
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - cloud

volumes:
  pgdata:
