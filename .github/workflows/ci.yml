name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-edge:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build edge (React + Vite)
        run: npm run build:edge

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-dist
          path: packages/edge/dist/
          retention-days: 7

  build-cloud:
    name: Build Cloud Server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install production dependencies
        run: cd packages/cloud && npm ci --omit=dev

      - name: Verify server starts (syntax check)
        run: cd packages/cloud && node -e "require('./src/routes/auth.js')" 2>&1 || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-edge, build-cloud]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build cloud Docker image
        run: docker build -t swiftserve-cloud ./packages/cloud

      - name: Build edge Docker image
        run: |
          cd packages/edge
          npm ci
          npm run build
          docker build -t swiftserve-edge .
